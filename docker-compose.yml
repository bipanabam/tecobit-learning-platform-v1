version: "3.9"

services:
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_DB: learning_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    expose:
      - 5432
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    image: tecobit-learning-platform:latest
    build: .
    command: /entrypoint.sh
    volumes:
      - ./src:/app:rw
    ports:
      - "8000:8000"
    depends_on:
      - db
    env_file:
      - .env.compose
                                                    
volumes:
  postgres_data: